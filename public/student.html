<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görevlerim - MSÜ AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo-small">🎯</div>
                <span>MSÜ AI</span>
            </div>
            <ul class="nav-menu">
                <li onclick="navigate('dashboard')"><i class="fas fa-home"></i><span>Ana Sayfa</span></li>
                <li class="active" onclick="navigate('student')"><i class="fas fa-tasks"></i><span>Görevlerim</span></li>
                <li onclick="navigate('exam')"><i class="fas fa-file-alt"></i><span>Deneme</span></li>
                <li onclick="navigate('topic')"><i class="fas fa-book"></i><span>Konu Anlatımı</span></li>
                <li onclick="navigate('weak')"><i class="fas fa-exclamation-triangle"></i><span>Zayıf Konular</span></li>
                <li onclick="navigate('admin')" id="admin-nav" class="hidden"><i class="fas fa-cog"></i><span>Admin</span></li>
            </ul>
            <div class="sidebar-footer">
                <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </nav>

        <main class="main-content">
            <header class="page-header">
                <h1>📝 Görevlerim</h1>
                <div class="header-actions">
                    <button onclick="openAddTaskModal()" class="btn-secondary">
                        <i class="fas fa-plus"></i> Manuel Görev Ekle
                    </button>
                    <button onclick="generateAIPlan()" class="btn-primary">
                        <i class="fas fa-magic"></i> AI Plan Oluştur
                    </button>
                </div>
            </header>

            <!-- Filters -->
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterTasks('all')">Tümü</button>
                <button class="filter-btn" onclick="filterTasks('pending')">Bekleyen</button>
                <button class="filter-btn" onclick="filterTasks('completed')">Tamamlanan</button>
                <button class="filter-btn" onclick="filterTasks('ai')">AI Görevleri</button>
            </div>

            <!-- Tasks Grid -->
            <div id="tasks-container" class="tasks-grid">
                <!-- Tasks will be loaded here -->
            </div>

            <!-- Add Task Modal -->
            <div id="add-task-modal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Yeni Görev Ekle</h2>
                        <button onclick="closeModal()" class="btn-close">&times;</button>
                    </div>
                    <form id="add-task-form">
                        <div class="form-group">
                            <label>Görev Başlığı</label>
                            <input type="text" id="task-title" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Ders</label>
                                <select id="task-subject" required>
                                    <option value="Türkçe">Türkçe</option>
                                    <option value="Matematik">Matematik</option>
                                    <option value="Geometri">Geometri</option>
                                    <option value="Fen Bilimleri">Fen Bilimleri</option>
                                    <option value="Sosyal Bilimler">Sosyal Bilimler</option>
                                    <option value="İngilizce">İngilizce</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Konu</label>
                                <input type="text" id="task-topic" placeholder="Örn: Paragraf, Denklem...">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Süre (dakika)</label>
                                <input type="number" id="task-duration" value="60" min="5" max="180">
                            </div>
                            <div class="form-group">
                                <label>XP Puanı</label>
                                <input type="number" id="task-xp" value="20" min="5" max="100">
                            </div>
                        </div>
                        <button type="submit" class="btn-primary btn-full">Görev Ekle</button>
                    </form>
                </div>
            </div>

            <!-- Task Complete Modal -->
            <div id="complete-modal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Görevi Tamamla</h2>
                    </div>
                    <div class="complete-options">
                        <h3>Bu görevi doğru tamamladın mı?</h3>
                        <div class="complete-buttons">
                            <button onclick="completeTask(true)" class="btn-success btn-large">
                                <i class="fas fa-check"></i>
                                <span>Evet, Doğru</span>
                                <small>+Tam XP</small>
                            </button>
                            <button onclick="completeTask(false)" class="btn-danger btn-large">
                                <i class="fas fa-times"></i>
                                <span>Hayır, Yanlış</span>
                                <small>+Az XP</small>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Page specific initialization
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadTasks();
        });
    </script>
</body>
</html>
